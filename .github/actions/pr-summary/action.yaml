---
name: pr-summary
description: |
  GitHub Action for automatic generation of pull request summaries using OpenAI.
  Key features:
  - Analyzes PR changes using AI
  - Automatically links to JIRA issues from commit messages
  - Generates structured Markdown with change analysis
  - Updates PR description with the generated summary
  The action processes all changes in the PR, analyzes them with OpenAI,
  and updates the PR description with a clean, readable summary.

inputs:
  github-token:
    description: GitHub token
    required: true
  jira-url:
    description: base url for Jira
    required: false
    default: https://saritasa.atlassian.net
  openai-api-key:
    description: openai api key for PR summary generation
    required: true
  openai-model:
    description: openai model to use for PR summary generation
    required: false
    default: gpt-5
  openai-prompt:
    description: The prompt template to use for OpenAI
    required: false
    default: >-
      You are helping to generate a Pull Request summary that teammates will read.  
      The goal is to describe what was done and why it matters, in a neutral and factual way.  

      Guidelines:
      - Focus on the overall purpose, impact, and outcomes of the changes.  
        Think in terms of features, fixes, improvements, integrations, or workflow changes.  
      - Ignore trivial or mechanical edits (e.g. .terraform-version, .terraform.lock.hcl, 
        version bumps, config alignment, boilerplate replacements, formatting changes).  
      - Ignore any changes to README.md and CHANGELOG.md files completely.
      - Do not list changes per file. Do not mention file names explicitly.  
      - Group related changes together and capture them as one bullet point.  
      - Keep the summary concise: 1–3 bullet points, or one short paragraph if it reads better.  
      - **Use only neutral, descriptive wording. Do not include subjective qualifiers or judgments** 
        (e.g. avoid words like "first-class", "improved", "robust", "reliable", "important"). 
      - Ignore formatting or typo fixes.  

      Changed files:
      {all_files}

      Code changes:
      {code_changes}

      Your response (start with bullet points immediately):
  pr-number:
    description: PR number to update with the generated summary
    required: true

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install openai-agents uv PyGithub

    - name: Generate PR summary
      shell: bash
      env:
        GITHUB_TOKEN: ${{inputs.github-token}}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        REPO_PATH: ${{github.workspace}}
        REPOSITORY: ${{github.repository}}
        OPENAI_PROMPT: ${{ inputs.openai-prompt }}
      run: |
        set -euo pipefail
        python ${{github.action_path}}/pr-summary-generator.py \
          --jira-url "${{inputs.jira-url}}" \
          --model "${{inputs.openai-model}}" \
          --pr-number "${{inputs.pr-number}}"
